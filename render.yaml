services:
  - type: web
    name: dna-sequence-matcher
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        value: jdbc:h2:file:/app/data/dna-db
      - key: SPRING_DATASOURCE_DRIVERCLASSNAME
        value: org.h2.Driver
      - key: SPRING_DATASOURCE_USERNAME
        value: sa
      - key: SPRING_DATASOURCE_PASSWORD
        value: ""
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
